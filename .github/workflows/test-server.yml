name: Local Test Server

on:
  workflow_dispatch:
    inputs:
      duration:
        description: 'How long to keep the server active (in hours)?'
        required: true
        default: '1'
        type: choice
        options:
          - '0.5'
          - '1'
          - '2'
          - '4'
          - '6'

jobs:
  run-server:
    name: Run Local Voice Chat Server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Project Dependencies
        run: npm ci || npm install

      - name: Compile and Start Application Server
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NODE_ENV: production
        run: |
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "::warning::GEMINI_API_KEY secret is not set in your GitHub Repository secrets. The app will run in offline demo mode."
          else
            echo "SUCCESS: Found GEMINI_API_KEY in Repository Secrets."
          fi
          
          # Build frontend SPA & backend Express server
          npm run build
          
          # Boot server on port 3000 in background
          npm start &
          echo "SERVER_PID=$!" >> $GITHUB_ENV
          
          echo "Waiting 3 seconds for backend server to bind to port 3000..."
          sleep 3

      - name: Print Server Instructions
        run: |
          echo "### 🚀 LOCAL VOICE CHAT SERVER STARTED" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Your server has been compiled and is now running on standard port 3000:" >> $GITHUB_STEP_SUMMARY
          echo "- **Local URL:** \`http://localhost:3000\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Duration:** \`${{ github.event.inputs.duration }} hours\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "If you are running this custom action on a self-hosted runner or have mapped ports from your host, you can access the app at \`http://localhost:3000\` directly." >> $GITHUB_STEP_SUMMARY

      - name: Hold Server Active
        run: |
          DURATION_HOURS=${{ github.event.inputs.duration }}
          DURATION_SECONDS=$(echo "$DURATION_HOURS * 3600" | bc -l | cut -d'.' -f1)
          
          echo "Server running on http://localhost:3000"
          echo "Keeping runner active for $DURATION_HOURS hour(s) ($DURATION_SECONDS seconds)..."
          
          # Sleep for requested duration
          sleep $DURATION_SECONDS
          
          echo "Time limit reached!"

      - name: Post-Run Cleanup
        if: always()
        run: |
          echo "Stopping local instances..."
          if [ -n "$SERVER_PID" ]; then
            kill $SERVER_PID || true
          fi
          
