name: Temp Voice Chat Test Server

on:
  workflow_dispatch:
    inputs:
      duration:
        description: 'How long to keep the server running (in hours)?'
        required: true
        default: '1'
        type: choice
        options:
          - '0.5'
          - '1'
          - '2'
          - '4'

jobs:
  run-server:
    name: Run Remote Test Server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Project Dependencies
        run: npm ci || npm install

      - name: Compile and Start Application Server
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NODE_ENV: production
        run: |
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "::warning::GEMINI_API_KEY secret is not set in your GitHub Repository secrets. The app will run in offline mode!"
          else
            echo "SUCCESS: Found GEMINI_API_KEY in Repository Secrets."
          fi
          
          # Build frontend SPA & backend Express server
          npm run build
          
          # Boot server on port 3000 in background
          npm start &
          echo "SERVER_PID=$!" >> $GITHUB_ENV
          
          echo "Waiting 3 seconds for backend server to bind to port 3000..."
          sleep 3

      - name: Establish Zero-Config Secure HTTPS Tunnel
        id: tunnel
        run: |
          echo "Installing Cloudflare Tunnel client (no SSH key or port 22 needed)..."
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -O cloudflared
          chmod +x cloudflared
          
          echo "Starting Cloudflare quick tunnel..."
          ./cloudflared tunnel --url http://localhost:3000 > cf.log 2>&1 &
          echo "TUNNEL_PID=$!" >> $GITHUB_ENV
          
          # Wait up to 12 seconds for registration to complete and log URL
          sleep 12
          
          # Extract trycloudflare.com url
          TUNNEL_URL=$(grep -o -E "https://[a-zA-Z0-9.-]+\.trycloudflare\.com" cf.log | head -n 1)
          
          if [ -z "$TUNNEL_URL" ]; then
            echo "Cloudflare Tunnel did not start. Attempting Localtunnel fallback..."
            npx localtunnel --port 3000 > lt.log 2>&1 &
            echo "TUNNEL_PID=$!" >> $GITHUB_ENV
            sleep 10
            TUNNEL_URL=$(grep -o -E "https://[a-zA-Z0-9.-]+\.loca\.lt" lt.log | head -n 1)
          fi

          if [ -z "$TUNNEL_URL" ]; then
            echo "Localtunnel fell back. Attempting localhost.run fallback..."
            ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -R 80:localhost:3000 nokey@localhost.run > lt_run.log 2>&1 &
            echo "TUNNEL_PID=$!" >> $GITHUB_ENV
            sleep 8
            TUNNEL_URL=$(grep -o -E "https://[a-zA-Z0-9.-]+\.localhost\.run" lt_run.log | head -n 1)
          fi
          
          if [ -n "$TUNNEL_URL" ]; then
            echo "SUCCESS: Remote secure address bridged to: $TUNNEL_URL"
            echo "TUNNEL_URL=$TUNNEL_URL" >> $GITHUB_ENV
            
            # Print beautiful breakdown for user inside GitHub runs summary dashboard!
            echo "### 🚀 SECURE TEST SERVER IS ACTIVE!" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Because your frontend is hosted on a secure page (like GitHub Pages or AI Studio preview), you must match it with a secure connection to bypass your browser's security rules." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "#### 📋 HOW TO USE IT:" >> $GITHUB_STEP_SUMMARY
            echo "1. Highlight and copy this secure URL:" >> $GITHUB_STEP_SUMMARY
            echo "   \`$TUNNEL_URL\`" >> $GITHUB_STEP_SUMMARY
            echo "2. Open your deployed web app in your browser (e.g. GitHub Pages or AI Studio preview)." >> $GITHUB_STEP_SUMMARY
            echo "3. Scroll to **Static Host Connector (CORS Bridge)** in the settings (bottom left)." >> $GITHUB_STEP_SUMMARY
            echo "4. Paste the copied URL into the address input." >> $GITHUB_STEP_SUMMARY
            echo "5. Your web app is now connected to this running GitHub server! Enjoy real-time voice chat!" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "---" >> $GITHUB_STEP_SUMMARY
            echo "- **Session Runtime Limit:** \`${{ github.event.inputs.duration }} hours\`" >> $GITHUB_STEP_SUMMARY
            echo "- To terminate this connection early, click the red **'Cancel run'** button on the top right." >> $GITHUB_STEP_SUMMARY
          else
            echo "::error::Failed to establish any secure public bridge."
            echo "=== Cloudflare Logs ==="
            cat cf.log || true
            echo "=== Localtunnel Logs ==="
            cat lt.log || true
            exit 1
          fi

      - name: Keep Active
        run: |
          DURATION_HOURS=${{ github.event.inputs.duration }}
          DURATION_SECONDS=$(echo "$DURATION_HOURS * 3600" | bc -l | cut -d'.' -f1)
          
          echo "Tunnel running at: $TUNNEL_URL"
          echo "Holding GitHub Action active for $DURATION_HOURS hour(s) ($DURATION_SECONDS seconds)..."
          
          sleep $DURATION_SECONDS
          echo "Time limit reached! Automatic shutdown."

      - name: Post-Run Cleanup
        if: always()
        run: |
          echo "Stopping runner instances and tunnels..."
          if [ -n "$TUNNEL_PID" ]; then
            kill $TUNNEL_PID || true
          fi
          if [ -n "$SERVER_PID" ]; then
            kill $SERVER_PID || true
          fi
